<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GildedReads</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --gold-dark: #8a6a1f;
      --cream: #faf6ee;
      --brown: #2c1a0e;
      --brown-mid: #5c3a1e;
      --green: #2d4a3e;
      --green-light: #3d6b5a;
      --red: #8b2635;
      --parchment: #f0e6cc;
      --shadow: rgba(44,26,14,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--brown);
      min-height: 100vh;
    }

    header {
      background: var(--green);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--cream);
      font-style: italic;
      font-weight: 400;
    }

    .hero {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 60%, var(--gold-dark) 100%);
      padding: 4rem 2rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      color: var(--cream);
      position: relative;
    }

    .hero h1 em { color: var(--gold); font-style: italic; }

    .hero p {
      margin-top: 0.75rem;
      color: rgba(250,246,238,0.75);
      font-size: 1rem;
      font-family: 'Lora', serif;
      font-style: italic;
      position: relative;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      padding: 2.5rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .book-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 16px var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(201,168,76,0.15);
    }

    .book-card:hover {
      box-shadow: 0 4px 24px var(--shadow);
    }

    /*
      HOW TO ADD YOUR OWN IMAGES:
      In the books array below, find the book you want to update.
      Replace the URL in the "image" field with a direct link to your image.
      Example: image: "https://yoursite.com/your-image.jpg"
      The image will fill the cover area and the title sits on top of it.
    */
    .book-cover {
      height: 160px;
      display: flex;
      align-items: flex-end;
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }

    .book-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);
      z-index: 1;
    }

    .book-cover-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: white;
      line-height: 1.25;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .genre-tag {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 0.68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border-radius: 99px;
      z-index: 3;
    }

    .book-body {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .book-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .book-author {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--brown-mid);
    }

    .book-year {
      font-size: 0.75rem;
      color: #999;
      font-weight: 300;
    }

    .stars {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .star { font-size: 1rem; color: #ddd; }
    .star.filled { color: var(--gold); }
    .star.half { color: var(--gold); opacity: 0.55; }

    .avg-rating {
      font-size: 0.78rem;
      color: var(--brown-mid);
      margin-left: 0.35rem;
      font-weight: 500;
    }

    .book-desc {
      font-family: 'Lora', serif;
      font-size: 0.85rem;
      line-height: 1.65;
      color: #4a3728;
    }

    .significance-pill {
      display: inline-block;
      background: rgba(45,74,62,0.08);
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.2rem 0.7rem;
      border-radius: 99px;
      border: 1px solid rgba(45,74,62,0.2);
    }

    .reviews-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--green);
      font-weight: 500;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
    }

    .reviews-toggle:hover { color: var(--gold-dark); }

    .reviews-toggle .arrow {
      transition: transform 0.25s;
      display: inline-block;
    }

    .reviews-toggle.open .arrow { transform: rotate(180deg); }

    .reviews-panel {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(201,168,76,0.2);
    }

    .reviews-panel.open { display: flex; }

    .review {
      background: var(--parchment);
      border-radius: 8px;
      padding: 0.85rem 1rem;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .reviewer-name {
      font-weight: 500;
      font-size: 0.8rem;
      color: var(--brown);
    }

    .reviewer-role {
      font-size: 0.7rem;
      color: #999;
      font-style: italic;
    }

    .review-stars { font-size: 0.75rem; }

    .review-text {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #5c3a1e;
    }

    .author-bio-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--red);
      font-weight: 500;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: color 0.2s;
    }

    .author-bio-toggle:hover { color: var(--gold-dark); }

    .author-bio-panel {
      display: none;
      background: rgba(139,38,53,0.05);
      border-left: 3px solid var(--red);
      padding: 0.85rem 1rem;
      border-radius: 0 8px 8px 0;
      margin-top: 0.5rem;
    }

    .author-bio-panel.open { display: block; }

    .author-bio-panel p {
      font-family: 'Lora', serif;
      font-size: 0.82rem;
      line-height: 1.65;
      color: #5c3a1e;
    }

    .card-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }



    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,26,14,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--cream);
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: modalIn 0.3s ease;
      position: relative;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-cover {
      height: 180px;
      display: flex;
      align-items: flex-end;
      padding: 1.5rem;
      position: relative;
      background-size: cover;
      background-position: center;
    }

    .modal-cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);
    }

    .modal-cover-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .modal-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .modal-close:hover { background: rgba(255,255,255,0.35); }

    .modal-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
      border-bottom: 1px solid rgba(201,168,76,0.3);
      padding-bottom: 0.4rem;
      margin-bottom: 0.5rem;
    }

    .modal-review {
      background: var(--parchment);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    .modal-review:last-child { margin-bottom: 0; }

    .read-more-btn {
      background: var(--green);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .read-more-btn:hover { background: var(--green-light); }

    @media (max-width: 600px) {
      .books-grid { grid-template-columns: 1fr; padding: 1.5rem 1rem; }
      .stats-bar { gap: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Gilded<span>Reads</span></div>
</header>

<div class="hero">
  <h1>Books That Shaped <em>Gilded America</em></h1>
  <p>Historical reviews from the people who lived through it</p>
  <p style="margin-top:0.5rem;color:rgba(250,246,238,0.5);font-size:0.8rem;font-family:'DM Sans',sans-serif;font-style:normal;letter-spacing:2px;text-transform:uppercase;position:relative;">1865 – 1898</p>
</div>

<div class="books-grid" id="booksGrid"></div>



<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-cover" id="modalCover">
      <div class="modal-cover-title" id="modalTitle"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>



<script>
const books = [
  {
    id: 1,
    title: "How the Other Half Lives",
    author: "Jacob Riis",
    year: 1890,
    genre: "Muckraking",
    // TO CHANGE IMAGE: Replace the URL below with your own image link
    image: "https://mymodernmet.com/wp/wp-content/uploads/2017/05/jacob-riis-how-the-other-half-lives-thumbnail.jpg",
    rating: 4.5,
    significance: "Sparked urban reform and muckraking journalism",
    desc: "A pioneering work of photojournalism exposing the brutal living conditions in New York City's immigrant tenements. Riis used flash photography to drag the slums into the public eye, forcing middle-class readers to reckon with poverty they had ignored.",
    apushImport: "One of the earliest examples of muckraking journalism; directly influenced Theodore Roosevelt's housing reforms and the New York Tenement House Act of 1901. Key to understanding Gilded Age inequality and the roots of the Progressive Era.",
    authorBio: "Jacob Riis (1849-1914) emigrated from Denmark to New York in 1870, where he experienced poverty firsthand before becoming a police reporter for the New York Sun. A devout Christian, he combined journalism with a moral mission, pioneering flash photography to document slum conditions. His friendship with Theodore Roosevelt gave his work direct political impact.",
    reviews: [
      { name: "Theodore Roosevelt", role: "NYC Police Commissioner, 1895", stars: 5, text: "I have read your book and I have come to help. Riis's work is not comfortable reading. It is not meant to be. Every reformer in this city should be required to sit with it." },
      { name: "A Tenement Landlord", role: "Lower East Side, NYC", stars: 1, text: "Sensationalist drivel. My tenants have roofs over their heads and work to do. What more does this Danish meddler want? This book will only stir up trouble where there is none." },
      { name: "A Settlement House Worker", role: "Henry Street, NYC, 1892", stars: 5, text: "Finally, someone has said plainly what we see every day. Riis has given a face and a name to suffering that this city's comfortable classes have been perfectly happy to ignore." }
    ]
  },
  {
    id: 2,
    title: "The Gospel of Wealth",
    author: "Andrew Carnegie",
    year: 1889,
    genre: "Political Economy",
    // TO CHANGE IMAGE: Replace the URL below with your own image link
    image: "https://bloximages.newyork1.vip.townnews.com/communitynews.org/content/tncms/assets/v3/editorial/d/5d/d5d07b51-fdd1-5864-b564-ea406036c667/606f69ed25330.image.jpg",
    rating: 3.0,
    significance: "Defined elite philanthropy and justified industrial wealth",
    desc: "Carnegie's sweeping essay argues that immense wealth is not a sin but a responsibility. The rich, he contends, are stewards of civilization, obligated to spend their fortunes wisely on public institutions rather than leave it to idle heirs or the chaos of redistribution.",
    apushImport: "A foundational text of Gilded Age ideology. Carnegie's philosophy both challenged Social Darwinism and reinforced wealth inequality by insisting the rich, not workers or the government, should decide how wealth is used. Critical for understanding the tension between capitalism and reform.",
    authorBio: "Andrew Carnegie (1835-1919) immigrated from Scotland as a child and rose from telegraph messenger to become the wealthiest man in America through the steel industry. He later gave away over $350 million (roughly $5 billion today), funding 2,500 libraries worldwide. His story became the defining Gilded Age rags-to-riches narrative.",
    reviews: [
      { name: "John D. Rockefeller", role: "Standard Oil magnate", stars: 4, text: "Carnegie and I differ on methods, but his central point is sound. Wealth accumulated honestly ought to be returned to society. Though I confess I find his tone rather self-congratulatory." },
      { name: "Samuel Gompers", role: "President, American Federation of Labor", stars: 1, text: "He builds libraries with the wages he refused to pay his workers. Carnegie could have started with an eight-hour workday before writing philosophy about the duties of the rich." },
      { name: "A Steel Worker, Homestead PA", role: "Carnegie Steel Plant, 1892", stars: 1, text: "Gospel of Wealth? He locked us out and brought Pinkerton men with rifles. Let him keep his libraries. I want the wages he owes me." },
      { name: "Jane Addams", role: "Hull House, Chicago", stars: 3, text: "The impulse toward philanthropy is admirable. But Carnegie's framework asks nothing of the system that produces poverty, only of the wealthy men it enriches. That is a comfortable kind of reform." }
    ]
  },
  {
    id: 3,
    title: "The Significance of the Frontier in American History",
    author: "Frederick Jackson Turner",
    year: 1893,
    genre: "Frontier History",
    // TO CHANGE IMAGE: Replace the URL below with your own image link
    image: "https://cdn.britannica.com/79/171779-050-32244EA6/Emigrants-depiction-Kanesville-settlers-Missouri-River-William.jpg",
    rating: 3.5,
    significance: "Redefined American identity and sparked the expansionism debate",
    desc: "Delivered at the 1893 Chicago World's Fair, Turner's landmark essay argues that the American frontier, now officially closed per the 1890 census, was the engine of American democracy, individualism, and national character. Its closing, he warns, ends an era.",
    apushImport: "The Frontier Thesis shaped American historical thinking for decades and provided intellectual justification for overseas imperialism. If the frontier forged American identity, its closing raised the question: where does America expand next? Directly connected to the Spanish-American War and the debate over empire.",
    authorBio: "Frederick Jackson Turner (1861-1932) was a University of Wisconsin historian whose 1893 paper became one of the most influential and debated essays in American history. He argued that the frontier experience explained American exceptionalism: its democracy, its individualism, its restlessness. Later scholars challenged his thesis for erasing Native American experience entirely.",
    reviews: [
      { name: "Theodore Roosevelt", role: "Author and future President", stars: 5, text: "Turner has put into words what many of us have felt but could not articulate. The frontier made us Americans. The question his essay leaves burning is: what do we do now that it is gone?" },
      { name: "Sitting Bull", role: "Hunkpapa Lakota leader", stars: 1, text: "He speaks of free land and wilderness as if no one lived there. My people were on that land. The frontier that forged his democracy was the border of our destruction." },
      { name: "A Historian, 1893", role: "American Historical Association", stars: 4, text: "Turner's argument is sweeping, perhaps too sweeping, but it is impossible to ignore. He has reframed the entire question of what made this country what it is. Whether he is right is another matter." }
    ]
  },
  {
    id: 4,
    title: "A Century of Dishonor",
    author: "Helen Hunt Jackson",
    year: 1881,
    genre: "Social Reform",
    // TO CHANGE IMAGE: Replace the URL below with your own image link
    image: "https://m.media-amazon.com/images/I/71NqwXVYfFS._AC_UF1000,1000_QL80_.jpg",
    rating: 4.0,
    significance: "Exposed U.S. betrayal of Native Americans; inspired the Dawes Act",
    desc: "A meticulously documented indictment of the U.S. government's century of broken treaties, forced removal, and betrayal of Native American nations. Jackson sent a copy to every member of Congress. She wanted shame to do what law had not.",
    apushImport: "Jackson's book directly prompted national debate on Native American policy and contributed to the passage of the Dawes Act (1887), though ironically, the Dawes Act ultimately caused more land loss for Native peoples. Illustrates the complex and often destructive relationship between reform movements and the communities they claimed to help.",
    authorBio: "Helen Hunt Jackson (1830-1885) was a Massachusetts poet and novelist who became a passionate advocate for Native American rights after attending a lecture by Ponca Chief Standing Bear in 1879. She lobbied Congress, filed reports, and wrote both A Century of Dishonor and the novel Ramona to expose U.S. Indian policy. She died before seeing the Dawes Act passed.",
    reviews: [
      { name: "Chief Standing Bear", role: "Ponca Nation leader", stars: 5, text: "She listened. She wrote what she heard. Most Americans do not want to know what their government has done in their name. Jackson made it harder to look away." },
      { name: "A U.S. Senator", role: "Senate Indian Affairs Committee, 1881", stars: 2, text: "Mrs. Jackson is a novelist, not a lawyer. Her account is emotional and one-sided. The government has always acted in good faith toward the Indian, given the circumstances." },
      { name: "A Reformer, Boston Indian Citizenship Committee", role: "1882", stars: 4, text: "This book should be read in every schoolhouse in America. Jackson has done the painful work of documentation so that the rest of us cannot claim ignorance. The question now is: what will we do with it?" }
    ]
  },
  {
    id: 5,
    title: "Bosses of the Senate",
    author: "Joseph Keppler",
    year: 1889,
    genre: "Political Satire",
    // TO CHANGE IMAGE: Replace the URL below with your own image link
    image: "https://www.senate.gov/art-artifacts/resources/graphics/source/38_00392_001_a.jpg",
    rating: 4.5,
    significance: "Iconic image of corporate capture of American democracy",
    desc: "Not a book but an image that struck harder than any essay. Keppler's Puck magazine cartoon shows massive, bloated trust monopolies looming over tiny senators, who sit below them as mere puppets. The gallery for the people is locked. The message was unmistakable.",
    apushImport: "Keppler's cartoon is one of the most important primary sources for understanding Gilded Age politics and the relationship between big business and government. It visually captures the critique that Populists, reformers, and later Progressives made about corporate capture of democracy. Directly connects to antitrust debates and the push for the Sherman Antitrust Act (1890).",
    authorBio: "Joseph Keppler (1838-1894) was an Austrian immigrant and the founder of Puck, America's first successful humor magazine. His political cartoons reached hundreds of thousands of readers weekly and shaped public opinion during the Gilded Age. He was particularly devastating in his attacks on monopolies, Tammany Hall corruption, and the influence of money in politics.",
    reviews: [
      { name: "A Populist Farmer, Kansas", role: "Member, Farmers' Alliance, 1890", stars: 5, text: "Keppler drew what we already knew. Those fat trusts own the Senate same as they own the railroads. At least someone in New York had the nerve to print it." },
      { name: "Jay Gould", role: "Railroad magnate and financier", stars: 1, text: "Inflammatory nonsense from a foreign cartoonist with a grudge. I have never set foot in the Senate chamber. My lawyers handle those relationships." },
      { name: "A Progressive-Era Journalist", role: "McClure's Magazine, 1902", stars: 5, text: "Keppler drew in 1889 what we are still writing about today. This cartoon did more to explain Gilded Age politics in a single image than a dozen academic essays." }
    ]
  },
  {
    id: 6,
    title: "Looking Backward: 2000-1887",
    author: "Edward Bellamy",
    year: 1888,
    genre: "Utopian Fiction",
    // TO CHANGE IMAGE: Replace the URL below with your own image link

    significance: "Best-selling critique of capitalism; inspired Nationalist Clubs",
    desc: "Julian West falls asleep in 1887 Boston and wakes in the year 2000, where inequality has been abolished, industry is nationalized, and workers are citizens of a cooperative commonwealth. The novel sold over a million copies and launched a political movement.",
    apushImport: "Looking Backward was one of the most widely-read novels of the 19th century and directly inspired the formation of Nationalist Clubs across the country, early predecessors to the Progressive movement. It expressed the anxiety many Americans felt about Gilded Age inequality and offered a coherent alternative, influencing figures from labor organizers to suffragists.",
    authorBio: "Edward Bellamy (1850-1898) was a Massachusetts journalist and novelist who wrote Looking Backward in 18 months. He expected a modest readership; instead, the book became a cultural phenomenon, selling over a million copies by 1900. Bellamy Nationalist Clubs, inspired by the novel, sprang up across the country. He died of tuberculosis at 48, before seeing the Progressive Era his book helped inspire.",
    reviews: [
      { name: "Eugene V. Debs", role: "Labor organizer and Socialist", stars: 5, text: "Bellamy showed that another world is possible, not through fantasy, but through logic. If industry can be organized for war, it can be organized for human need. This book planted the seed in a generation of workers." },
      { name: "Andrew Carnegie", role: "Steel magnate and philanthropist", stars: 2, text: "An entertaining enough dream, but a dangerous one. Bellamy's world has no room for individual achievement, no incentive for the genius that drives progress. Utopia is the enemy of excellence." },
      { name: "A Suffragist, National American Woman Suffrage Association", role: "1892", stars: 4, text: "Bellamy's year 2000 includes women as full economic participants. After years of being told we are unsuited for public life, reading a future where that argument has simply been discarded was quietly radical." }
    ]
  }
];

function renderStars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (rating >= i) html += '<span class="star filled">★</span>';
    else if (rating >= i - 0.5) html += '<span class="star half">★</span>';
    else html += '<span class="star">★</span>';
  }
  return html;
}

function renderCards(booksToRender) {
  const grid = document.getElementById('booksGrid');
  grid.innerHTML = '';
  booksToRender.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.innerHTML = `
      <div class="book-cover" style="background-image: url('${book.image}'); background-color: #2d4a3e;">
        <span class="genre-tag">${book.genre}</span>
        <div class="book-cover-title">${book.title}</div>
      </div>
      <div class="book-body">
        <div class="book-meta">
          <div>
            <div class="book-author">${book.author}</div>
            <div class="book-year">${book.year}</div>
          </div>
          <div style="text-align:right">
            <div class="stars">${renderStars(book.rating)} <span class="avg-rating">${book.rating}</span></div>
          </div>
        </div>
        <p class="book-desc">${book.desc}</p>
        <div><span class="significance-pill">📌 ${book.significance}</span></div>
        <div class="card-actions">
          <button class="reviews-toggle" onclick="toggleReviews(this, ${book.id})">
            Historical Reviews (${book.reviews.length}) <span class="arrow">▼</span>
          </button>
          <button class="author-bio-toggle" onclick="toggleBio(this, ${book.id})">
            Author Bio <span class="arrow">▼</span>
          </button>
          <button class="read-more-btn" onclick="openModal(${book.id})">Full Entry →</button>
        </div>
        <div class="reviews-panel" id="reviews-${book.id}">
          ${book.reviews.map(r => `
            <div class="review">
              <div class="review-header">
                <div>
                  <div class="reviewer-name">${r.name}</div>
                  <div class="reviewer-role">${r.role}</div>
                </div>
                <div class="review-stars">${renderStars(r.stars)}</div>
              </div>
              <p class="review-text">"${r.text}"</p>
            </div>
          `).join('')}
        </div>
        <div class="author-bio-panel" id="bio-${book.id}">
          <p>${book.authorBio}</p>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleReviews(btn, bookId) {
  const panel = document.getElementById(`reviews-${bookId}`);
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}

function toggleBio(btn, bookId) {
  const panel = document.getElementById(`bio-${bookId}`);
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
}

function openModal(bookId) {
  const book = books.find(b => b.id === bookId);
  document.getElementById('modalCover').style.backgroundImage = `url('${book.image}')`;
  document.getElementById('modalCover').style.backgroundColor = '#2d4a3e';
  document.getElementById('modalTitle').textContent = book.title;
  document.getElementById('modalBody').innerHTML = `
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem">
        <div>
          <div style="font-family:'Lora',serif;font-style:italic;color:var(--brown-mid)">${book.author}, ${book.year}</div>
          <span class="significance-pill" style="margin-top:0.35rem;display:inline-block">📌 ${book.significance}</span>
        </div>
        <div class="stars" style="font-size:1.1rem">${renderStars(book.rating)} <span class="avg-rating" style="font-size:0.9rem">${book.rating}/5</span></div>
      </div>
    </div>
    <div>
      <div class="modal-section-title">About This Work</div>
      <p style="font-family:'Lora',serif;font-size:0.88rem;line-height:1.7;color:#4a3728">${book.desc}</p>
    </div>
    <div>
      <div class="modal-section-title">Historical Significance</div>
      <p style="font-family:'Lora',serif;font-size:0.88rem;line-height:1.7;color:#4a3728">${book.apushImport}</p>
    </div>
    <div>
      <div class="modal-section-title">Author Biography</div>
      <p style="font-family:'Lora',serif;font-size:0.88rem;line-height:1.7;color:#4a3728">${book.authorBio}</p>
    </div>
    <div>
      <div class="modal-section-title">Historical Reviews</div>
      ${book.reviews.map(r => `
        <div class="modal-review">
          <div class="review-header">
            <div>
              <div class="reviewer-name">${r.name}</div>
              <div class="reviewer-role">${r.role}</div>
            </div>
            <div>${renderStars(r.stars)}</div>
          </div>
          <p class="review-text" style="margin-top:0.5rem">"${r.text}"</p>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

renderCards(books);
</script>
</body>
</html>
